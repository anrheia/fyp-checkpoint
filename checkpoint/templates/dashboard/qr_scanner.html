{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{% static 'css/checkpoint.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=logout" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <title>QR Scanner — {{ business.name }}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body data-theme="checkpoint">
    <div class="bg-mesh"></div>

    <div class="page">
        <nav>
            <div class="navbar shadow-sm rounded-box" style="background: oklch(99% 0 0 / 0.45); backdrop-filter: blur(20px);">
                <div class="navbar-start">
                    <span class="nav-logo" style="padding: 0.75rem;">CheckPoint</span>
                </div>
                <div class="navbar-center hidden sm:flex">
                    <span class="subtitle nav-subtitle">{{ business.name }}</span>
                </div>
                <div class="navbar-end">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" style="padding: 1rem; color: oklch(28% 0.04 195)">
                            <span class="material-symbols-outlined">logout</span>
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <div style="padding: 1.5rem 2.5rem; max-width: 32rem; margin: 0 auto;">

            <!-- Page header -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                <div>
                    <h2 style="font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.875rem; letter-spacing: -0.03em; color: oklch(28% 0.04 195);">QR Scanner</h2>
                    <p style="font-size: 0.78rem; color: oklch(55% 0.04 195); margin-top: 0.2rem;">{{ business.name }} - QR Scanner</p>
                </div>
                <a href="{% url 'dashboard' %}">
                    <button type="button" style="font-size: 0.8rem; padding: 0.35rem 0.85rem; border-radius: 9999px; background: oklch(99% 0 0 / 0.7); border: 1px solid oklch(0% 0 0 / 0.1); color: oklch(28% 0.04 195); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;">← Dashboard</button>
                </a>
            </div>

            <!-- Result banner -->
            <div id="result-box" style="display: none; padding: 0.85rem 1rem; border-radius: 0.75rem; margin-bottom: 1.25rem; font-size: 0.875rem; font-weight: 500; text-align: center; transition: all 0.3s;"></div>

            <!-- Camera card -->
            <div style="background: oklch(99% 0 0 / 0.65); backdrop-filter: blur(20px); border: 1px solid oklch(0% 0 0 / 0.07); box-shadow: 0 8px 32px oklch(0% 0 0 / 0.06); border-radius: 1rem; overflow: hidden;">

                <!-- Viewfinder -->
                <div style="position: relative; background: oklch(15% 0.02 195); aspect-ratio: 1;">
                    <video id="preview" style="width: 100%; height: 100%; object-fit: cover; display: block;" playsinline></video>

                    <!-- Corner brackets -->
                    <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                        <div style="position: relative; width: 55%; aspect-ratio: 1;">
                            <div style="position: absolute; top: 0; left: 0; width: 2rem; height: 2rem; border-top: 3px solid white; border-left: 3px solid white; border-radius: 2px 0 0 0;"></div>
                            <div style="position: absolute; top: 0; right: 0; width: 2rem; height: 2rem; border-top: 3px solid white; border-right: 3px solid white; border-radius: 0 2px 0 0;"></div>
                            <div style="position: absolute; bottom: 0; left: 0; width: 2rem; height: 2rem; border-bottom: 3px solid white; border-left: 3px solid white; border-radius: 0 0 0 2px;"></div>
                            <div style="position: absolute; bottom: 0; right: 0; width: 2rem; height: 2rem; border-bottom: 3px solid white; border-right: 3px solid white; border-radius: 0 0 2px 0;"></div>
                        </div>
                    </div>
                </div>

                <!-- Status bar -->
                <div style="padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.6rem;">
                    <span id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: oklch(68% 0.13 168); flex-shrink: 0; animation: pulse 2s infinite;"></span>
                    <p id="status-text" style="font-size: 0.82rem; color: oklch(45% 0.04 195);">Scanning for QR code…</p>
                </div>
            </div>

            <!-- Manual PIN entry -->
            <div style="margin-top: 1.25rem; background: oklch(99% 0 0 / 0.65); backdrop-filter: blur(20px); border: 1px solid oklch(0% 0 0 / 0.07); box-shadow: 0 8px 32px oklch(0% 0 0 / 0.06); border-radius: 1rem; padding: 1.25rem 1.5rem;">
                <p style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: oklch(55% 0.04 195); margin-bottom: 0.75rem;">Can't scan? Enter fallback code</p>
                <div style="display: flex; gap: 0.6rem;">
                    <input id="pin-input" type="text" maxlength="6" placeholder="A1B2C3" autocomplete="off" style="flex: 1; padding: 0.5rem 0.85rem; border-radius: 0.6rem; border: 1px solid oklch(0% 0 0 / 0.12); background: oklch(99% 0 0 / 0.8); font-family: 'DM Sans', monospace; font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; color: oklch(28% 0.04 195); text-transform: uppercase; outline: none;">
                    <button onclick="handlePin()" style="padding: 0.5rem 1.1rem; border-radius: 0.6rem; background: oklch(28% 0.04 195); color: white; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;">Submit</button>
                </div>
            </div>

        </div>
    </div>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="{% static 'js/pin_scan.js' %}"></script>
    <script>
        const video = document.getElementById("preview");
        const resultBox = document.getElementById("result-box");
        const statusText = document.getElementById("status-text");
        const statusDot = document.getElementById("status-dot");
        let scanning = true;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                requestAnimationFrame(tick);
            } catch (e) {
                showResult("Camera access denied or unavailable.", "error");
                statusText.textContent = "Camera unavailable.";
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext("2d").drawImage(video, 0, 0);
                const imageData = canvas.getContext("2d").getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code && scanning) {
                    scanning = false;
                    handleScan(code.data);
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        async function handleScan(url) {
            statusText.textContent = "Code detected, processing…";
            const match = url.match(/\/qr-scan\/([a-f0-9\-]{36})\//);
            if (!match) {
                showResult("Invalid QR code — please try again.", "error");
                reset();
                return;
            }

            try {
                const resp = await fetch(`/qr-scan/${match[1]}/`, {
                    method: "POST",
                    headers: { "X-CSRFToken": "{{ csrf_token }}", "Content-Type": "application/json" },
                });
                const data = await resp.json();
                if (resp.ok) {
                    showResult(data.message, data.action === "clocked_in" ? "success" : "info");
                } else {
                    showResult(data.error || "Something went wrong.", "error");
                }
            } catch (e) {
                showResult("Network error — please try again.", "error");
            }

            setTimeout(reset, 4000);
        }

        function reset() {
            scanning = true;
            statusText.textContent = "Scanning for QR code…";
            statusDot.style.background = "oklch(68% 0.13 168)";
            requestAnimationFrame(tick);
        }

        function showResult(msg, type) {
            const styles = {
                success: { bg: "oklch(94% 0.05 168 / 0.4)", border: "oklch(68% 0.13 168 / 0.3)", color: "oklch(35% 0.13 168)" },
                error:   { bg: "oklch(94% 0.04 25 / 0.35)", border: "oklch(70% 0.1 25 / 0.3)",   color: "oklch(40% 0.18 25)" },
                info:    { bg: "oklch(94% 0.03 195 / 0.35)", border: "oklch(70% 0.05 195 / 0.3)", color: "oklch(35% 0.08 195)" },
            };
            const s = styles[type] || styles.info;
            resultBox.style.display = "block";
            resultBox.style.background = s.bg;
            resultBox.style.border = `1px solid ${s.border}`;
            resultBox.style.color = s.color;
            resultBox.textContent = msg;
            statusText.textContent = msg;
            statusDot.style.background = type === "success" ? "oklch(68% 0.13 168)" : type === "error" ? "oklch(55% 0.18 25)" : "oklch(60% 0.08 195)";
        }

        startCamera();
    </script>
</body>
</html>
