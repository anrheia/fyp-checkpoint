{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{% static 'css/checkpoint.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=logout" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <title>Schedule Assistant</title>
</head>
<body data-theme="checkpoint">
    <div class="bg-mesh"></div>

    <div class="page">
        <nav>
            <div class="navbar shadow-sm rounded-box" style="background: oklch(99% 0 0 / 0.45); backdrop-filter: blur(20px);">
                <div class="navbar-start">
                    <span class="nav-logo" style="padding: 0.75rem;">CheckPoint</span>
                </div>
                <div class="navbar-center hidden sm:flex">
                    <span class="subtitle nav-subtitle">Schedule Assistant</span>
                </div>
                <div class="navbar-end">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" style="padding: 1rem; color: oklch(28% 0.04 195)">
                            <span class="material-symbols-outlined">logout</span>
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <div style="padding: 1.5rem 2.5rem; display: flex; flex-direction: column; flex: 1;">

            <!-- Back button -->
            <div style="max-width: 48rem; margin: 0 auto 1rem; width: 100%;">
                <a href="{% url 'dashboard' %}">
                    <button type="button" style="font-size: 0.8rem; padding: 0.35rem 0.85rem; border-radius: 9999px; background: oklch(99% 0 0 / 0.7); border: 1px solid oklch(0% 0 0 / 0.1); color: oklch(28% 0.04 195); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;">← Dashboard</button>
                </a>
            </div>

            <!-- Chat card -->
            <div style="max-width: 48rem; margin: 0 auto; width: 100%; display: flex; flex-direction: column; flex: 1;">
                <div style="background: oklch(99% 0 0 / 0.65); backdrop-filter: blur(20px); border: 1px solid oklch(0% 0 0 / 0.07); box-shadow: 0 8px 32px oklch(0% 0 0 / 0.06); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; flex: 1;">

                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <div>
                            <h2 style="font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; color: oklch(28% 0.04 195); margin: 0;">Schedule Assistant</h2>
                            <p style="font-size: 0.75rem; color: oklch(55% 0.04 195); margin-top: 0.2rem;">Ask who's working, when, and where.</p>
                        </div>
                        <button type="button" id="clear-btn" onclick="clearChat()" style="font-size: 0.72rem; padding: 0.25rem 0.7rem; border-radius: 9999px; background: oklch(94% 0.02 195 / 0.6); border: 1px solid oklch(0% 0 0 / 0.08); color: oklch(45% 0.04 195); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;">Clear</button>
                    </div>

                    <div style="height: 1px; background: oklch(0% 0 0 / 0.07);"></div>

                    <!-- Messages area -->
                    <div id="chat-messages" style="flex: 1; min-height: 18rem; max-height: 28rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding-right: 0.25rem;">
                        <!-- Welcome message -->
                        <div style="display: flex; gap: 0.6rem; align-items: flex-start;">
                            <div style="width: 1.75rem; height: 1.75rem; border-radius: 9999px; background: oklch(62% 0.17 265 / 0.15); border: 1px solid oklch(62% 0.17 265 / 0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.75rem;">✦</div>
                            <div style="background: oklch(97% 0.01 195 / 0.8); border: 1px solid oklch(0% 0 0 / 0.06); border-radius: 0 0.85rem 0.85rem 0.85rem; padding: 0.6rem 0.85rem; max-width: 85%;">
                                <p style="font-size: 0.82rem; color: oklch(35% 0.04 195); margin: 0; line-height: 1.5;">Hi! Ask me things like <em>"who's working Friday in Luigi's?"</em> or <em>"who's on shift next Monday?"</em></p>
                            </div>
                        </div>
                    </div>

                    <!-- Input row -->
                    <div style="display: flex; gap: 0.5rem; align-items: flex-end;">
                        <input id="chat-input" type="text" placeholder="e.g. Who's working next Friday?" autocomplete="off"
                            style="flex: 1; background: white; border: 1.5px solid oklch(82% 0.03 195); border-radius: 0.75rem; padding: 0.55rem 0.85rem; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: oklch(28% 0.04 195); outline: none; box-sizing: border-box;"
                            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}">
                        <button onclick="sendMessage()" id="send-btn" class="text-white bg-gradient-to-br from-green-400 to-blue-600 hover:bg-gradient-to-bl focus:ring-4 focus:outline-none focus:ring-green-200 font-medium text-center leading-5" style="padding: 0.55rem 1.1rem; border-radius: 0.75rem; border: none; cursor: pointer; font-size: 0.875rem; flex-shrink: 0;">Send</button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('chat-messages');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        function getCsrf() {
            return document.cookie.split('; ').find(r => r.startsWith('csrftoken='))?.split('=')[1] || '';
        }

        function appendMessage(role, text) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.style.cssText = `display: flex; gap: 0.6rem; align-items: flex-start; ${isUser ? 'flex-direction: row-reverse;' : ''}`;

            const avatar = document.createElement('div');
            avatar.style.cssText = `width: 1.75rem; height: 1.75rem; border-radius: 9999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; font-weight: 600; ${isUser ? 'background: oklch(62% 0.17 265 / 0.12); border: 1px solid oklch(62% 0.17 265 / 0.2); color: oklch(38% 0.12 265);' : 'background: oklch(62% 0.17 265 / 0.15); border: 1px solid oklch(62% 0.17 265 / 0.25); color: oklch(38% 0.12 265);'}`;
            avatar.textContent = isUser ? 'You' : '✦';

            const bubble = document.createElement('div');
            bubble.style.cssText = `border: 1px solid oklch(0% 0 0 / 0.06); padding: 0.6rem 0.85rem; max-width: 85%; ${isUser ? 'background: oklch(62% 0.17 265 / 0.08); border-radius: 0.85rem 0 0.85rem 0.85rem;' : 'background: oklch(97% 0.01 195 / 0.8); border-radius: 0 0.85rem 0.85rem 0.85rem;'}`;

            // Preserve line breaks in bot responses
            const p = document.createElement('p');
            p.style.cssText = 'font-size: 0.82rem; color: oklch(35% 0.04 195); margin: 0; line-height: 1.55; white-space: pre-wrap;';
            p.textContent = text;

            bubble.appendChild(p);
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendTyping() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.style.cssText = 'display: flex; gap: 0.6rem; align-items: flex-start;';
            wrapper.innerHTML = `
                <div style="width:1.75rem;height:1.75rem;border-radius:9999px;background:oklch(62% 0.17 265/0.15);border:1px solid oklch(62% 0.17 265/0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.75rem;">✦</div>
                <div style="background:oklch(97% 0.01 195/0.8);border:1px solid oklch(0% 0 0/0.06);border-radius:0 0.85rem 0.85rem 0.85rem;padding:0.6rem 0.85rem;">
                    <span style="display:inline-flex;gap:0.3rem;align-items:center;">
                        <span style="width:0.4rem;height:0.4rem;border-radius:50%;background:oklch(55% 0.04 195);animation:bounce 1s infinite 0s;display:inline-block;"></span>
                        <span style="width:0.4rem;height:0.4rem;border-radius:50%;background:oklch(55% 0.04 195);animation:bounce 1s infinite 0.2s;display:inline-block;"></span>
                        <span style="width:0.4rem;height:0.4rem;border-radius:50%;background:oklch(55% 0.04 195);animation:bounce 1s infinite 0.4s;display:inline-block;"></span>
                    </span>
                </div>`;
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            inputEl.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', text);
            appendTyping();

            try {
                const res = await fetch("{% url 'schedule_chat_api' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': getCsrf() },
                    body: new URLSearchParams({ message: text, csrfmiddlewaretoken: getCsrf() }),
                });
                const data = await res.json();
                document.getElementById('typing-indicator')?.remove();
                appendMessage('bot', data.answer || 'Something went wrong.');
            } catch {
                document.getElementById('typing-indicator')?.remove();
                appendMessage('bot', 'Error contacting server.');
            } finally {
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        function clearChat() {
            messagesEl.innerHTML = '';
            appendMessage('bot', 'Chat cleared. Ask me who\'s working, when, and where.');
        }

        inputEl.focus();
    </script>

    <style>
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb { background: oklch(82% 0.03 195); border-radius: 9999px; }
    </style>
</body>
</html>
