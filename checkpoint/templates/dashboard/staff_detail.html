{% block content %}
<h2>
  {{ target_membership.user.get_full_name|default:target_membership.user.username }}
  <span class="badge">{{ target_membership.get_role_display }}</span>
</h2>
<p>@ {{ business.name }}</p>

<a href="{% url 'view_staff' business.id %}">← Back to staff list</a>
{% endblock %}
