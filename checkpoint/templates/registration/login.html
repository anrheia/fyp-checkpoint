{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{% static 'css/checkpoint.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <title>Log in</title>
</head>
<body data-theme="checkpoint">
    <div class="bg-mesh"></div>

    <div class="page" style="align-items: center; justify-content: center;">
        <div style="width: 100%; max-width: 22rem; padding: 1.5rem;">

            <div style="text-align: center; margin-bottom: 1.75rem;">
                <span class="nav-logo">CheckPoint</span>
                <p style="font-size: 0.75rem; color: oklch(55% 0.04 195); margin-top: 0.4rem;">Sign in to your account</p>
            </div>

            <div style="background: oklch(99% 0 0 / 0.65); backdrop-filter: blur(20px); border: 1px solid oklch(0% 0 0 / 0.07); box-shadow: 0 8px 32px oklch(0% 0 0 / 0.06); border-radius: 1.25rem; padding: 1.75rem;">
                <h2 style="font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; color: oklch(28% 0.04 195); margin-bottom: 0.25rem;">Log in</h2>

                <div style="height: 1px; background: oklch(0% 0 0 / 0.07); margin-bottom: 1.5rem;"></div>

                {% if form.errors %}
                <div style="margin-bottom: 1rem; padding: 0.6rem 0.85rem; border-radius: 0.75rem; background: oklch(94% 0.04 25 / 0.3); border: 1px solid oklch(70% 0.1 25 / 0.3);">
                    <p style="font-size: 0.8rem; color: oklch(40% 0.18 25); margin: 0;">Invalid username or password. Please try again.</p>
                </div>
                {% endif %}

                <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                    {% csrf_token %}

                    <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                        <label style="font-size: 0.75rem; font-weight: 500; color: oklch(40% 0.04 195);">Username</label>
                        {{ form.username }}
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                        <label style="font-size: 0.75rem; font-weight: 500; color: oklch(40% 0.04 195);">Password</label>
                        <div style="position: relative;">
                            {{ form.password }}
                            <button type="button"
                                onmousedown="this.previousElementSibling.type='text'"
                                onmouseup="this.previousElementSibling.type='password'"
                                onmouseleave="this.previousElementSibling.type='password'"
                                ontouchstart="this.previousElementSibling.type='text';return false;"
                                ontouchend="this.previousElementSibling.type='password'"
                                style="position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; color: oklch(55% 0.04 195); display: flex; align-items: center; line-height: 1;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <button type="submit" class="text-white bg-gradient-to-br from-green-400 to-blue-600 hover:bg-gradient-to-bl focus:ring-4 focus:outline-none focus:ring-green-200 font-medium text-center leading-5" style="width: 100%; padding: 0.55rem 1rem; border-radius: 9999px; border: none; cursor: pointer; font-size: 0.875rem; margin-top: 0.5rem;">
                        Log in
                    </button>
                </form>
            </div>

            <p style="text-align: center; font-size: 0.78rem; color: oklch(55% 0.04 195); margin-top: 1.25rem;">
                Don't have an account? <a href="{% url 'owner_signup' %}" style="color: oklch(40% 0.1 265); font-weight: 500; text-decoration: none;">Register as an owner</a>
            </p>

        </div>
    </div>
    <footer style="text-align: center; padding: 1.5rem 0 1rem; font-size: 0.7rem; color: oklch(65% 0.03 195); font-family: 'DM Sans', sans-serif;">Made by: Jana Sy</footer>
</body>
</html>
