services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: myproject.settings.ci
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000 --timeout 180 --log-level debug --capture-output --enable-stdio-inheritance
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: