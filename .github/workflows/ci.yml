name: CI 

on: 
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_call:                         # ← add this
    secrets:
      POSTGRES_DB:
        required: true
      POSTGRES_USER:
        required: true
      POSTGRES_PASSWORD:
        required: true
      DJANGO_SECRET_KEY:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: myproject.settings.ci
      PYTHONUNBUFFERED: 1
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432


    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks 
        run: |
          python manage.py check --deploy

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run Migrations
        run: |
          python manage.py migrate --noinput

      - name: Confirm Migrations fully Applied
        run: |
          python manage.py migrate --check

      - name: Collect Static Files
        run: |
          python manage.py collectstatic --noinput

      - name: Run Tests
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          python manage.py test checkpoint.staff_tests checkpoint.supervisor_tests checkpoint.owner_tests checkpoint.scanner_tests
          

